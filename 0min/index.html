<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta	name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
		<meta name="author" content="Miguel Gea">
  		<meta name="description" content="RevealJS-MINIMO-ONLINE  versión 1.0, marzo 2026">
 		<meta name="keywords" content="HTML, CSS, JavaScript, RevealJS">	
		<title>reveal.js MIN</title>

		<!--- Configuracion minima para funcionar en modo web sin recursos locales -->
		<!---- Versión codepen: https://codepen.io/editor/mediaUX/pen/019d6443-a7df-7247-8497-5ad3db0f93c8 -->

		<link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/reveal.css">
		<link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/theme/white.css">

	</head>
	<body class="reveal-viewport theme-font-montserrat theme-color-white-blue">	
		
		<div class="reveal">
			<div class="slides">

            <!----- Coordenada de SLIDE ----->
				<div id="coords" style="
    			position: fixed; 
    			bottom: 0px; 
    			left: 40%; 
				background: rgba(0,0,0,0.7); 
    			color: #0f0; 
    			padding: 10px; 
    			font-family: monospace; 		
				font-size: 14px;
    			z-index: 9999; 
    			border-radius: 5px;
    			pointer-events: auto;">
    			0, 0
			</div>
			
            
		<!---- Slide 0 ---->	
			<section> Slides 0 
				<p> Presentación RevealJS mínima </p>   
			</section>

      	<!---- Slides 1 ---->
			<section>
				
				<section>Slide 1.0</section>
				<section>Slide 1.1</section>
          		<section>Slide 1.2</section>		
      		</section>

      	<!---- Slide 2 ----> 
      		<section >
				<section>Slide 2.0</section>
        		<section>Slide 2.1</section>
      		</section>
			
			</div>

		</div>

	<!------- SCRIPTS ---------------------------->	
	<script src="https://unpkg.com/reveal.js/dist/reveal.js"></script>

	<script>
		// More info about initialization & config:
		// - https://revealjs.com/initialization/
		// - https://revealjs.com/config/
		Reveal.initialize({
				hash: true,
				transition: 'fade',
    			fragments: true,
    			autoPlayMedia: true,
    			controls: true,
    			progress: true

				// Learn about plugins: https://revealjs.com/plugins/
				/* plugins: [RevealMarkdown, RevealHighlight, RevealNotes], */
		});

		/* Actualizar coordenada de slide */ 
		Reveal.on('slidechanged', event => {
  				const h = event.indexh 
				const v = event.indexv 
				document.getElementById("coords").textContent = `${h},${v}`
			})
		</script>
	</body>
</html>
